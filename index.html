<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stroke Trial screening tool</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202c;
      --muted: #5e6d7e;
      --line: #d9e0e8;
      --primary: #0f766e;
      --primary-dark: #0b5f59;
      --violet: #6d28d9;
      --amber: #92400e;
      --green-bg: #ecfdf5;
      --green-line: #a7f3d0;
      --amber-bg: #fff7ed;
      --amber-line: #fed7aa;
      --gray-bg: #eef2f7;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(1040px, 100%);
      margin: 0 auto;
      padding: 18px 14px 40px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(1.7rem, 7vw, 2.5rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    h2,
    h3 {
      margin: 0;
      letter-spacing: 0;
    }

    h2 {
      font-size: 1.18rem;
    }

    h3 {
      font-size: 1.04rem;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    form,
    .trial-card,
    .workflow,
    .empty {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(23, 32, 44, 0.06);
    }

    form {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      font-weight: 750;
      font-size: 0.92rem;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      background: #fff;
      color: var(--ink);
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    button {
      border: 0;
      border-radius: 6px;
      min-height: 44px;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .primary:hover {
      background: var(--primary-dark);
    }

    .secondary {
      background: #e8edf3;
      color: var(--ink);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .results {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .trial-card {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .trial-card.match {
      border-color: var(--green-line);
      background: var(--green-bg);
    }

    .trial-card.review {
      border-color: var(--amber-line);
      background: var(--amber-bg);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 28px;
      border-radius: 999px;
      padding: 4px 8px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 0.8rem;
      font-weight: 850;
    }

    .badge.paused {
      background: #f3f4f6;
      color: #374151;
    }

    .details,
    .criteria-list,
    .contact-box {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .workflow {
      margin-top: 18px;
      padding: 16px;
      display: none;
      gap: 14px;
    }

    .workflow.visible {
      display: grid;
    }

    .question-list {
      display: grid;
      gap: 12px;
    }

    .two-col {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .section {
      display: grid;
      gap: 8px;
      padding-top: 4px;
    }

    .section ul {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
    }

    .small {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .empty {
      padding: 14px;
      color: var(--muted);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      border-radius: 6px;
      padding: 8px 10px;
      background: #ede9fe;
      color: var(--violet);
      font-weight: 800;
      text-decoration: none;
    }

    .links a:hover {
      text-decoration: underline;
    }

    .summary-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    @media (max-width: 680px) {
      .grid,
      .two-col {
        grid-template-columns: 1fr;
      }

      .card-top {
        display: grid;
      }

      button {
        flex: 1 1 150px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Stroke Trial screening tool</h1>

    <form id="screeningForm" novalidate>
      <div class="grid">
        <label>
          Age
          <input id="age" type="number" min="0" max="120" inputmode="numeric">
        </label>

        <label>
          NIHSS
          <input id="nihss" type="number" min="0" max="42" inputmode="numeric">
        </label>

        <label>
          Last known well
          <select id="lastKnownWell">
            <option value="">Select</option>
            <option value="2">0-2 hours</option>
            <option value="4.5">&gt;2 hours-4.5 hours</option>
            <option value="6">&gt;4.5 hours-6 hours</option>
            <option value="9">&gt;6 hours-9 hours</option>
            <option value="12">&gt;9 hours-12 hours</option>
            <option value="16">&gt;12 hours-16 hours</option>
            <option value="24">&gt;16 hours-1 day</option>
            <option value="48">&gt;1 day-2 days</option>
            <option value="96">&gt;2 days-4 days</option>
            <option value="168">&gt;4 days-7 days</option>
            <option value="4320">&gt;7 days-180 days</option>
            <option value="4321">&gt;180 days</option>
          </select>
        </label>

        <label>
          Stroke type
          <select id="strokeType">
            <option value="">Select</option>
            <option value="ischemic">Ischemic</option>
            <option value="hemorrhagic">Hemorrhagic</option>
            <option value="tia">TIA</option>
            <option value="unknown">Unknown</option>
          </select>
        </label>
      </div>

      <div class="actions">
        <button class="primary" type="submit">Submit</button>
        <button class="secondary" type="reset">Reset</button>
      </div>

      <div class="small">Screening aid only. Confirm all trial criteria with the study team and approved protocol.</div>
    </form>

    <section id="results" class="results" aria-live="polite"></section>
    <section id="workflow" class="workflow" aria-live="polite"></section>
  </main>

  <script src="trials-config.js"></script>
  <script>
    const form = document.querySelector("#screeningForm");
    const results = document.querySelector("#results");
    const workflow = document.querySelector("#workflow");
    const initialVariables = new Set(["age", "nihss", "lknHours", "strokeType"]);
    let config = { trials: [] };

    async function loadConfig() {
      try {
        const response = await fetch("trials-config.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        config = normalizeConfig(await response.json());
      } catch (error) {
        config = normalizeConfig(window.TRIAL_CONFIG || {});
      }

      if ((config.trials || []).length) {
        populateLastKnownWellOptions();
        renderResults(catalogEvaluations(), null, "catalog");
      } else {
        results.innerHTML = `<div class="empty">Could not load trial data. Keep index.html, trials-config.json, and trials-config.js in the same folder.</div>`;
      }
    }

    function normalizeConfig(rawConfig) {
      const rawTrials = Array.isArray(rawConfig) ? rawConfig : rawConfig?.trials;
      const trials = Array.isArray(rawTrials) ? rawTrials.map(normalizeTrial).filter((trial) => trial.id) : [];
      return { ...(rawConfig || {}), trials };
    }

    function populateLastKnownWellOptions() {
      const select = document.querySelector("#lastKnownWell");
      const clinicalStops = [4.5, 6, 9, 12, 48, 96];
      const windows = [...new Set([
        ...clinicalStops,
        ...(config.trials || [])
        .map((trial) => Number(initialCriteria(trial).lknHoursMax))
        .filter((hours) => Number.isFinite(hours) && hours > 0)
      ])]
        .sort((a, b) => a - b);

      select.innerHTML = `<option value="">Select</option>`;
      let previous = 0;
      windows.forEach((hours) => {
        const option = document.createElement("option");
        option.value = String(hours);
        option.textContent = previous === 0
          ? `0-${formatHours(hours)}`
          : `>${formatHours(previous)}-${formatHours(hours)}`;
        select.appendChild(option);
        previous = hours;
      });

      if (windows.length) {
        const option = document.createElement("option");
        option.value = String(windows[windows.length - 1] + 1);
        option.textContent = `>${formatHours(windows[windows.length - 1])}`;
        select.appendChild(option);
      }
    }

    function formatHours(hours) {
      if (hours % 24 === 0 && hours >= 24) {
        const days = hours / 24;
        return days === 1 ? "1 day" : `${days} days`;
      }
      return hours === 1 ? "1 hour" : `${hours} hours`;
    }

    function normalizeTrial(trial) {
      const info = trial.overview || {};
      const initial = trial.screening?.initial || {};
      const secondary = trial.screening?.secondary || {};
      const resources = trial.resources || {};
      const contact = trial.contact || {};

      return {
        ...trial,
        id: trial.id || trial.TrialID || info.shortName,
        status: normalize(trial.status || trial.Status || "active"),
        overview: {
          title: info.title || trial.title || trial.TrialName || trial.id,
          shortName: info.shortName || trial.shortName || trial.ShortName || trial.id,
          strokeType: info.strokeType || trial.strokeType || trial.StrokeType,
          category: info.category || trial.category || trial.TrialCategory
        },
        screening: {
          initial: {
            criteria: initial.criteria || trial.initialScreen || {},
            logicRules: initial.logicRules || []
          },
          secondary: {
            questions: secondary.questions || trial.questions || [],
            logicRules: secondary.logicRules || [],
            criteriaText: secondary.criteriaText || trial.criteriaText || {}
          }
        },
        resources: {
          links: resources.links || trial.links || []
        },
        contact: {
          pi: contact.pi || trial.pi || trial.PI,
          coordinator: contact.coordinator || trial.coordinator || trial.Coordinator,
          coordinatorEmail: contact.coordinatorEmail || trial.coordinatorEmail,
          coordinatorPhone: contact.coordinatorPhone || trial.coordinatorPhone,
          backupContact: contact.backupContact || trial.backupContact,
          notes: contact.notes || trial.contactNotes
        }
      };
    }

    function catalogEvaluations() {
      return (config.trials || []).map((trial) => ({
        trial,
        isMatch: false,
        reasons: [],
        pending: ["Enter patient details to run initial screening"]
      }));
    }

    function overview(trial) {
      return trial.overview || {
        title: trial.title,
        shortName: trial.shortName,
        strokeType: trial.strokeType,
        category: trial.category
      };
    }

    function initialCriteria(trial) {
      return trial.screening?.initial?.criteria || trial.initialScreen || {};
    }

    function initialRules(trial) {
      return trial.screening?.initial?.logicRules || (trial.logicRules || []).filter((rule) => initialVariables.has(rule.variable));
    }

    function secondaryRules(trial) {
      return trial.screening?.secondary?.logicRules || (trial.logicRules || []).filter((rule) => !initialVariables.has(rule.variable));
    }

    function secondaryQuestions(trial) {
      return trial.screening?.secondary?.questions || trial.questions || [];
    }

    function criteriaText(trial) {
      return trial.screening?.secondary?.criteriaText || trial.criteriaText || {};
    }

    function resourceLinks(trial) {
      return trial.resources?.links || trial.links || [];
    }

    function contactInfo(trial) {
      return trial.contact || {
        pi: trial.pi,
        coordinator: trial.coordinator,
        coordinatorEmail: trial.coordinatorEmail,
        coordinatorPhone: trial.coordinatorPhone,
        backupContact: trial.backupContact,
        notes: trial.contactNotes
      };
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalize(value) {
      return String(value ?? "").trim().toLowerCase();
    }

    function strokeTypeMatches(ruleValue, patientValue) {
      const source = normalize(ruleValue).replaceAll(" ", "");
      const patient = normalize(patientValue);
      if (!source || !patient || patient === "unknown") return true;
      if (source.includes("/")) return source.split("/").includes(patient);
      return source === patient;
    }

    function patientFromForm() {
      const age = document.querySelector("#age").value;
      const nihss = document.querySelector("#nihss").value;
      const lknHours = document.querySelector("#lastKnownWell").value;
      return {
        age: age === "" ? null : Number(age),
        nihss: nihss === "" ? null : Number(nihss),
        lknHours: lknHours === "" ? null : Number(lknHours),
        strokeType: document.querySelector("#strokeType").value
      };
    }

    function compare(actual, operator, expected) {
      if (actual === undefined || actual === null || actual === "") return { known: false, pass: true };
      const actualNumber = Number(actual);
      const expectedNumber = Number(expected);
      const useNumber = !Number.isNaN(actualNumber) && !Number.isNaN(expectedNumber);
      const left = useNumber ? actualNumber : normalize(actual);
      const right = useNumber ? expectedNumber : normalize(expected);

      switch (operator) {
        case ">=": return { known: true, pass: left >= right };
        case "<=": return { known: true, pass: left <= right };
        case ">": return { known: true, pass: left > right };
        case "<": return { known: true, pass: left < right };
        case "=":
        case "==": return { known: true, pass: left === right };
        case "!=": return { known: true, pass: left !== right };
        case "contains": return { known: true, pass: String(left).includes(String(right)) };
        default: return { known: false, pass: true };
      }
    }

    function evaluateInitial(trial, patient) {
      const screen = initialCriteria(trial);
      const reasons = [];
      const pending = [];

      if (screen.minAge !== null && screen.minAge !== undefined) {
        if (patient.age === null) pending.push("Age needed");
        else if (patient.age < Number(screen.minAge)) reasons.push("Age below listed range");
      }
      if (screen.maxAge !== null && screen.maxAge !== undefined) {
        if (patient.age === null) pending.push("Age needed");
        else if (patient.age > Number(screen.maxAge)) reasons.push("Age above listed range");
      }
      if (screen.nihssMin !== null && screen.nihssMin !== undefined) {
        if (patient.nihss === null) pending.push("NIHSS needed");
        else if (patient.nihss < Number(screen.nihssMin)) reasons.push("NIHSS below listed range");
      }
      if (screen.nihssMax !== null && screen.nihssMax !== undefined) {
        if (patient.nihss === null) pending.push("NIHSS needed");
        else if (patient.nihss > Number(screen.nihssMax)) reasons.push("NIHSS above listed range");
      }
      if (screen.lknHoursMax !== null && screen.lknHoursMax !== undefined) {
        if (patient.lknHours === null) pending.push("Last known well needed");
        else if (patient.lknHours > Number(screen.lknHoursMax)) reasons.push("Outside listed LKW window");
      }
      if (screen.strokeType) {
        if (!patient.strokeType) pending.push("Stroke type needed");
        else if (!strokeTypeMatches(screen.strokeType, patient.strokeType)) reasons.push("Stroke type differs from listed trial type");
      }

      initialRules(trial).forEach((rule) => {
        if (rule.variable === "strokeType") return;
        const result = compare(patient[rule.variable], rule.operator, rule.value);
        if (!result.known) pending.push(rule.failureReason || `${rule.variable} needs review`);
        if (result.known && !result.pass) reasons.push(rule.failureReason || `${rule.variable} outside criteria`);
      });

      secondaryRules(trial).forEach((rule) => {
        pending.push(rule.failureReason || `${rule.variable} needs follow-up`);
      });

      return {
        trial,
        isMatch: reasons.length === 0,
        reasons: [...new Set(reasons)],
        pending: [...new Set(pending)]
      };
    }

    function initialSummary(screen) {
      if (!screen) return "Initial criteria not listed";
      const parts = [];
      if (screen.strokeType) parts.push(`Type: ${screen.strokeType}`);
      if (screen.strokeSubtype) parts.push(`Subtype: ${screen.strokeSubtype}`);
      if (screen.minAge || screen.maxAge) parts.push(`Age: ${screen.minAge ?? "any"}-${screen.maxAge ?? "any"}`);
      if (screen.nihssMin || screen.nihssMax) parts.push(`NIHSS: ${screen.nihssMin ?? "any"}-${screen.nihssMax ?? "any"}`);
      if (screen.lknHoursMax) parts.push(`LKW window: up to ${screen.lknHoursMax} hours`);
      return parts.join(" | ") || "Initial criteria not listed";
    }

    function renderResults(evaluations, patient, mode = "screening") {
      const visibleTrials = evaluations
        .filter(({ trial }) => trial.status !== "inactive")
        .sort((a, b) => Number(b.isMatch) - Number(a.isMatch));

      if (!visibleTrials.length) {
        results.innerHTML = `<div class="empty">No trial records found in trials-config.json. The file loaded, but it did not contain a usable trials list.</div>`;
        return;
      }

      results.innerHTML = `
        ${mode === "catalog" ? `<div class="empty">Loaded ${visibleTrials.length} trial records. Enter patient details and press Submit to screen, or open any trial to review its questions, criteria, protocol links, and contacts.</div>` : ""}
        ${visibleTrials.map(({ trial, isMatch, reasons, pending }) => {
          const info = overview(trial);
          const badgeText = mode === "catalog" ? "Available trial" : (isMatch ? "Potential match" : "Review needed");
          return `
        <article class="trial-card ${mode === "catalog" ? "" : (isMatch ? "match" : "review")}">
          <div class="card-top">
            <div class="badges">
              <span class="badge">${badgeText}</span>
              ${trial.status && trial.status !== "active" ? `<span class="badge paused">${escapeHtml(trial.status)}</span>` : ""}
            </div>
            <button class="primary" type="button" data-trial="${escapeHtml(trial.id)}">Open screening</button>
          </div>
          <h3>${escapeHtml(info.shortName || trial.id)}: ${escapeHtml(info.title || "")}</h3>
          <p>${escapeHtml(info.category || "")}</p>
          <div class="details">
            <span>${escapeHtml(initialSummary(initialCriteria(trial)))}</span>
            ${reasons.length ? `<span>Initial review: ${escapeHtml(reasons.join("; "))}</span>` : ""}
            ${pending.length ? `<span>Follow-up checks: ${escapeHtml(pending.slice(0, 3).join("; "))}${pending.length > 3 ? "..." : ""}</span>` : ""}
          </div>
        </article>
      `;
        }).join("")}`;

      results.querySelectorAll("button[data-trial]").forEach((button) => {
        button.addEventListener("click", () => {
          const trial = config.trials.find((item) => item.id === button.dataset.trial);
          renderWorkflow(trial, patient);
        });
      });
    }

    function renderQuestion(question) {
      const id = `q_${question.id}`;
      const required = question.required ? "required" : "";
      const label = `${escapeHtml(question.text)}${question.required ? " *" : ""}`;
      const type = normalize(question.inputType);
      const options = question.options || [];

      if (type === "yesno") {
        const values = options.length ? options : ["Yes", "No", "Unknown"];
        return selectQuestion(id, label, values, required, question.variable);
      }

      if (type === "select") {
        return selectQuestion(id, label, options, required, question.variable);
      }

      if (type === "number") {
        return `<label>${label}<input id="${escapeHtml(id)}" data-variable="${escapeHtml(question.variable)}" type="number" inputmode="decimal" ${required}></label>`;
      }

      if (type === "textarea") {
        return `<label>${label}<textarea id="${escapeHtml(id)}" data-variable="${escapeHtml(question.variable)}" ${required}></textarea></label>`;
      }

      return `<label>${label}<input id="${escapeHtml(id)}" data-variable="${escapeHtml(question.variable)}" type="text" ${required}></label>`;
    }

    function selectQuestion(id, label, options, required, variable) {
      return `
        <label>
          ${label}
          <select id="${escapeHtml(id)}" data-variable="${escapeHtml(variable)}" ${required}>
            <option value="">Select</option>
            ${options.map((option) => `<option value="${escapeHtml(option)}">${escapeHtml(option)}</option>`).join("")}
          </select>
        </label>
      `;
    }

    function collectWorkflowAnswers() {
      const answers = {};
      workflow.querySelectorAll("[data-variable]").forEach((field) => {
        const variable = field.dataset.variable;
        if (!variable) return;
        answers[variable] = field.value;
      });
      return answers;
    }

    function evaluateSecondary(trial, patient, answers) {
      const values = { ...(patient || {}), ...answers };
      const failures = [];
      const unchecked = [];

      [...initialRules(trial), ...secondaryRules(trial)].forEach((rule) => {
        const result = compare(values[rule.variable], rule.operator, rule.value);
        if (!result.known) unchecked.push(rule.failureReason || `${rule.variable} not checked`);
        if (result.known && !result.pass) failures.push(rule.failureReason || `${rule.variable} outside criteria`);
      });

      return { failures: [...new Set(failures)], unchecked: [...new Set(unchecked)] };
    }

    function criteriaList(trial, type) {
      const items = criteriaText(trial)?.[type] || [];
      if (!items.length) return "";
      return `
        <div class="section">
          <h3>${type === "inclusion" ? "Inclusion" : "Exclusion"}</h3>
          <ul>${items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
        </div>
      `;
    }

    function contactBlock(trial) {
      const contact = contactInfo(trial);
      return `
        <div class="summary-box">
          <h3>Next steps</h3>
          <div class="contact-box">
            <span>PI: ${escapeHtml(contact.pi || "Not listed")}</span>
            <span>Coordinator: ${escapeHtml(contact.coordinator || "Not listed")}</span>
            ${contact.coordinatorEmail ? `<span>Email: ${escapeHtml(contact.coordinatorEmail)}</span>` : ""}
            ${contact.coordinatorPhone ? `<span>Phone/pager: ${escapeHtml(contact.coordinatorPhone)}</span>` : ""}
            ${contact.backupContact ? `<span>Backup: ${escapeHtml(contact.backupContact)}</span>` : ""}
            ${contact.notes ? `<span>${escapeHtml(contact.notes)}</span>` : ""}
          </div>
        </div>
      `;
    }

    function linkBlock(trial) {
      const links = resourceLinks(trial).filter((link) => link.url);
      if (!links.length) return "";
      return `
        <div class="summary-box">
          <h3>Protocol links</h3>
          <div class="links">
            ${links.map((link) => `<a href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(link.label || "Open protocol")}</a>`).join("")}
          </div>
        </div>
      `;
    }

    function renderWorkflow(trial, patient) {
      if (!trial) return;
      const info = overview(trial);
      const questions = secondaryQuestions(trial);
      const patientSummary = patient
        ? `Initial screen: age ${patient.age ?? "not entered"}, NIHSS ${patient.nihss ?? "not entered"}, ${patient.lknHours === null ? "last known well not entered" : `${patient.lknHours.toFixed(1)} hours from last known well`}, ${escapeHtml(patient.strokeType || "stroke type not entered")}.`
        : "No patient details entered yet. Trial questions, criteria, links, and contacts are still shown.";
      workflow.classList.add("visible");
      workflow.innerHTML = `
        <div class="card-top">
          <div>
            <h2>${escapeHtml(info.shortName || trial.id)} secondary screening</h2>
            <p>${escapeHtml(info.title || "")}</p>
          </div>
          <button class="secondary" type="button" id="closeWorkflow">Close</button>
        </div>
        <div class="small">${patientSummary}</div>
        <div class="question-list">
          ${questions.length ? questions.map(renderQuestion).join("") : `<div class="empty">No secondary questions listed for this trial.</div>`}
        </div>
        <div class="actions">
          <button class="primary" type="button" id="checkSecondary">Check secondary answers</button>
          <button class="secondary" type="button" id="clearSecondary">Clear answers</button>
        </div>
        <div id="secondaryResult"></div>
        <div class="two-col">
          ${criteriaList(trial, "inclusion")}
          ${criteriaList(trial, "exclusion")}
        </div>
        ${linkBlock(trial)}
        ${contactBlock(trial)}
      `;

      workflow.querySelector("#closeWorkflow").addEventListener("click", () => {
        workflow.classList.remove("visible");
        workflow.innerHTML = "";
      });

      workflow.querySelector("#clearSecondary").addEventListener("click", () => {
        workflow.querySelectorAll("input, select, textarea").forEach((field) => {
          field.value = "";
        });
        workflow.querySelector("#secondaryResult").innerHTML = "";
      });

      workflow.querySelector("#checkSecondary").addEventListener("click", () => {
        const outcome = evaluateSecondary(trial, patient, collectWorkflowAnswers());
        const target = workflow.querySelector("#secondaryResult");
        if (!outcome.failures.length) {
          target.innerHTML = `<div class="summary-box"><h3>Secondary screen</h3><p>No rule failures found from the answered fields. Confirm with protocol and study team.</p>${outcome.unchecked.length ? `<p>Not yet checked: ${escapeHtml(outcome.unchecked.join("; "))}</p>` : ""}</div>`;
        } else {
          target.innerHTML = `<div class="summary-box"><h3>Secondary screen</h3><p>Review before contacting team: ${escapeHtml(outcome.failures.join("; "))}</p></div>`;
        }
      });

      workflow.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const patient = patientFromForm();
      renderResults((config.trials || []).map((trial) => evaluateInitial(trial, patient)), patient);
      workflow.classList.remove("visible");
      workflow.innerHTML = "";
    });

    form.addEventListener("reset", () => {
      window.setTimeout(() => renderResults(catalogEvaluations(), null, "catalog"), 0);
      workflow.classList.remove("visible");
      workflow.innerHTML = "";
    });

    loadConfig();
  </script>
</body>
</html>
